<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confeitaria Paranhos - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* RESET E CORES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        :root { --petroleo: #0b3d45; --dourado: #c5a059; --whats: #25d366; }
        body { background-color: #f8f9fa; color: #333; overflow-x: hidden; }

        /* HEADER CENTRALIZADO */
        header {
            background-color: var(--petroleo);
            padding: 15px 0;
            border-bottom: 3px solid var(--dourado);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-box {
            display: flex;
            justify-content: center;
            width: 90%;
            max-width: 400px;
        }

        .logo-box img { width: 100%; height: auto; display: block; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4)); }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?q=80&w=1374') center/cover;
            padding: 60px 20px;
            text-align: center;
            color: white;
        }
        .hero h2 { font-size: 32px; font-family: 'Playfair Display', serif; }

        .btn-whats {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--whats);
            color: white;
            padding: 18px 38px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* SEÇÃO E CARDS */
        .secao { padding: 50px 20px; max-width: 1100px; margin: 0 auto; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
        
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-top: 5px solid var(--dourado);
        }
        .card i { font-size: 45px; color: var(--petroleo); margin-bottom: 15px; display: block; }

        /* REDES SOCIAIS */
        .redes { background: white; padding: 40px 20px; border-radius: 20px; margin: 40px auto; max-width: 850px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-top: 25px; }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .social-btn:hover { transform: scale(1.1); }

        .insta { background: linear-gradient(45deg, #f09433, #bc1888); }
        .face { background-color: #1877f2; }
        .tt { background-color: #000; }
        .maps { background-color: #ea4335; }

        footer { background-color: var(--petroleo); color: white; padding: 40px 20px; text-align: center; }

        /* MOBILE */
        @media (max-width: 768px) {
            .logo-box { max-width: 85%; }
            .hero h2 { font-size: 26px; }
            .social-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo paranhos.png" alt="Logo Paranhos">
        </div>
    </header>

    <section class="hero">
        <h2>Encomendas e Kit Festas</h2>
        <a href="https://wa.me/5521987978267" class="btn-whats" target="_blank">
            <i class="fab fa-whatsapp"></i> PEDIR PELO WHATSAPP
        </a>
    </section>

    <div class="secao">
        <h2 style="color: var(--petroleo); font-size: 32px; font-family: 'Playfair Display', serif;">Nossas Especialidades</h2>
        
        <div class="grid">
            <div class="card">
                <i class="fas fa-box-open"></i>
                <h3>Kit Festas</h3>
            </div>
            <div class="card">
                <i class="fas fa-coffee"></i>
                <h3>Café da Manhã</h3>
            </div>
            <div class="card">
                <i class="fas fa-utensils"></i>
                <h3>Buffet Completo</h3>
            </div>
        </div>

        <div class="redes">
            <h3 style="color: var(--petroleo); font-family: 'Playfair Display', serif;">Redes Sociais</h3>
            <div class="social-grid">
                <a href="https://www.instagram.com/confeitariaparanhos" class="social-btn insta" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
                <a href="https://www.facebook.com/Confeitariaparanhoss/" class="social-btn face" target="_blank"><i class="fab fa-facebook-f"></i> Facebook</a>
                <a href="https://www.tiktok.com/@confeitariaparanhos" class="social-btn tt" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
                
                <a href="https://www.google.com/maps/search/?api=1&query=Estrada+Santa+Eugênia+702+Paciência+Rio+de+Janeiro" class="social-btn maps" target="_blank">
                    <i class="fas fa-map-marker-alt"></i> Localização
                </a>
            </div>
        </div>
    </div>

    <footer>
        <p>📍 Estrada Santa Eugênia, 702 - Paciência, RJ</p>
        <p style="margin-top: 10px; font-size: 12px; opacity: 0.7;">© 2026 Confeitaria Paranhos</p>
    </footer>

</body>
</html>
